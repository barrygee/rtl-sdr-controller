version: '3.8'

services:
  rtl-tcp:
    build: .
    container_name: rtl-tcp
    restart: unless-stopped
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    ports:
      - "4321:4321"
    command: ["rtl_tcp", "-a", "0.0.0.0", "-p", "4321", "-n", "50"]
    healthcheck:
      # rtl_tcp can print "Failed to submit transfer 0 / Signal caught,
      # exiting!" after the SDR re-enumerates yet stay wedged without
      # exiting, so restart:unless-stopped never fires. Probing the TCP
      # port detects the wedged state and lets Docker cycle the container.
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/4321' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
